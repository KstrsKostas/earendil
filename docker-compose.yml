# Eärendil - Docker Compose (GPU)
# ================================
# Run with: docker compose up

services:
  earendil:
    build: .
    image: earendil:latest
    container_name: earendil
    
    # GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    # X11 forwarding for GUI
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    
    volumes:
      # X11 socket for display
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Persist sky cache
      - ./sky_cache:/app/sky_cache
      # Save rendered images to host
      - ./output:/app/output
    
    # Network for potential web interface
    network_mode: host
    
    # Interactive mode
    stdin_open: true
    tty: true
